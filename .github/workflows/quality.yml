name: Code Quality and Testing

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

env:
  PYTHON_VERSION_MATRIX: "['3.13', '3.14']"
  MAIN_PYTHON_VERSION: "3.13"

jobs:
  # Code Quality Checks
  quality:
    name: Code Quality (Ruff, MyPy, Bandit)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python ${{ env.MAIN_PYTHON_VERSION }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.MAIN_PYTHON_VERSION }}
        cache: 'pip'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .[quality]
        
    - name: Run Ruff linting
      run: |
        echo "::group::Ruff Linting"
        ruff check domainiq/ tests/ examples/ --output-format=github
        echo "::endgroup::"

    - name: Check generated mixins
      run: |
        echo "::group::Generated Mixin Drift"
        python scripts/generate_mixins.py --dry-run
        echo "::endgroup::"
        
    - name: Check Ruff formatting
      run: |
        echo "::group::Ruff Formatting Check"
        ruff format --check domainiq/ tests/ examples/
        echo "::endgroup::"
        
    - name: Run MyPy type checking
      run: |
        echo "::group::MyPy Type Checking"
        mypy domainiq/ --show-error-codes --pretty
        echo "::endgroup::"
        
    - name: Run Bandit security checks
      run: |
        echo "::group::Bandit Security Analysis"
        bandit -r domainiq/ --configfile pyproject.toml --format json --output bandit-report.json
        bandit -r domainiq/ --configfile pyproject.toml
        echo "::endgroup::"
        
    - name: Upload Bandit results to GitHub Security
      uses: github/codeql-action/upload-sarif@v3
      if: always()
      with:
        sarif_file: bandit-report.json

  # Unit Tests (no API key required)
  test-unit:
    name: Unit Tests (Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ${{ fromJson(env.PYTHON_VERSION_MATRIX) }}
            
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .[dev]
        
    - name: Run unit tests
      run: |
        pytest -v -m "not integration" --tb=short --junit-xml=junit-unit-${{ matrix.python-version }}.xml --cov=domainiq --cov-report=xml --cov-report=term
        
    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: unit-test-results-${{ matrix.os }}-${{ matrix.python-version }}
        path: |
          junit-unit-*.xml
          coverage.xml
          
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      if: matrix.os == 'ubuntu-latest' && matrix.python-version == env.MAIN_PYTHON_VERSION
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella

  # Integration Tests (requires API key)
  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Only run on main branch or if API key is available
    if: github.ref == 'refs/heads/main' || (github.event_name == 'pull_request' && secrets.DOMAINIQ_API_KEY != '')
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python ${{ env.MAIN_PYTHON_VERSION }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.MAIN_PYTHON_VERSION }}
        cache: 'pip'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .[dev,async]
        
    - name: Run integration tests
      env:
        DOMAINIQ_API_KEY: ${{ secrets.DOMAINIQ_API_KEY }}
      run: |
        pytest -v -m integration --tb=short --junit-xml=junit-integration.xml
        
    - name: Upload integration test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: integration-test-results
        path: junit-integration.xml

  # Security Scanning
  security:
    name: Security Scanning
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'
        
    - name: Upload Trivy scan results to GitHub Security
      uses: github/codeql-action/upload-sarif@v3
      if: always()
      with:
        sarif_file: 'trivy-results.sarif'

  # Dependency Audit
  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python ${{ env.MAIN_PYTHON_VERSION }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.MAIN_PYTHON_VERSION }}
        cache: 'pip'
        
    - name: Install pip-audit
      run: pip install pip-audit
      
    - name: Run dependency audit
      run: |
        pip-audit --desc --format=json --output=pip-audit-report.json
        pip-audit --desc
        
    - name: Upload audit results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: dependency-audit-results
        path: pip-audit-report.json

  # Build and Package Test
  build:
    name: Build Package
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [quality]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python ${{ env.MAIN_PYTHON_VERSION }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.MAIN_PYTHON_VERSION }}
        cache: 'pip'
        
    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build twine
        
    - name: Build package
      run: python -m build
      
    - name: Check package
      run: twine check dist/*
      
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: dist-packages
        path: dist/

  # Comprehensive Quality Gate
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs: [quality, test-unit, build]
    timeout-minutes: 5
    
    steps:
    - name: Quality Gate Status
      run: |
        echo "🎉 All quality checks passed!"
        echo "✅ Code quality: PASSED"
        echo "✅ Unit tests: PASSED" 
        echo "✅ Build: PASSED"
        echo ""
        echo "Ready for deployment! 🚀"

  # Performance Benchmarks (optional)
  benchmark:
    name: Performance Benchmarks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python ${{ env.MAIN_PYTHON_VERSION }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.MAIN_PYTHON_VERSION }}
        cache: 'pip'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .[dev,async]
        pip install pytest-benchmark
        
    - name: Run performance benchmarks
      run: |
        pytest tests/ -k "benchmark" --benchmark-json=benchmark-results.json
        
    - name: Upload benchmark results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: benchmark-results
        path: benchmark-results.json
