[pytest]
minversion = 7.0
addopts = -ra -m "not integration" --strict-markers --strict-config --cov=domainiq --cov-report=term-missing --cov-report=html --cov-report=xml
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests requiring API key
    unit: marks tests as unit tests
